<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Beverly Civic Assistant</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f5f5f5; color: #222; }
    header { background: #1a3a5c; color: white; padding: 1.25rem 1.5rem; }
    header h1 { font-size: 1.25rem; font-weight: 600; }
    header p { font-size: 0.85rem; opacity: 0.75; margin-top: 0.25rem; }
    main { max-width: 720px; margin: 2rem auto; padding: 0 1rem; }
    #chat { display: flex; flex-direction: column; gap: 1rem; margin-bottom: 1.5rem; min-height: 200px; }
    .bubble { padding: 0.875rem 1rem; border-radius: 8px; line-height: 1.55; max-width: 90%; }
    .bubble.user { background: #1a3a5c; color: white; align-self: flex-end; }
    .bubble.assistant { background: white; border: 1px solid #ddd; align-self: flex-start; white-space: pre-wrap; }
    .bubble.assistant a { color: #1a3a5c; }
    .sources { margin-top: 0.75rem; padding-top: 0.75rem; border-top: 1px solid #eee; font-size: 0.8rem; color: #666; }
    .sources span { display: block; margin-bottom: 0.2rem; font-weight: 600; }
    .sources a { color: #1a3a5c; text-decoration: none; display: block; margin-bottom: 0.2rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .sources a:hover { text-decoration: underline; }
    form { display: flex; gap: 0.5rem; }
    input { flex: 1; padding: 0.75rem 1rem; border: 1px solid #ccc; border-radius: 6px; font-size: 1rem; }
    button { padding: 0.75rem 1.25rem; background: #1a3a5c; color: white; border: none;
             border-radius: 6px; font-size: 1rem; cursor: pointer; }
    button:disabled { opacity: 0.5; cursor: default; }
    .hint { font-size: 0.8rem; color: #888; margin-top: 0.5rem; }
  </style>
</head>
<body>
  <header>
    <h1>Beverly Civic Assistant</h1>
    <p>Ask about meetings, city news, and local government in Beverly, MA</p>
  </header>
  <main>
    <div id="chat"></div>
    <form id="form">
      <input id="input" type="text" placeholder="What meetings are coming up this week?" autocomplete="off">
      <button id="btn" type="submit">Ask</button>
    </form>
    <p class="hint">Try: "What's the next city council meeting?" or "Any news about water service?"</p>
  </main>
  <script>
    const chat = document.getElementById('chat');
    const form = document.getElementById('form');
    const input = document.getElementById('input');
    const btn = document.getElementById('btn');

    function addBubble(text, role) {
      const div = document.createElement('div');
      div.className = 'bubble ' + role;
      div.innerHTML = role === 'assistant' ? markdownToHtml(text) : escapeHtml(text);
      chat.appendChild(div);
      div.scrollIntoView({ behavior: 'smooth' });
      return div;
    }

    function escapeHtml(t) {
      return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function markdownToHtml(t) {
      return escapeHtml(t)
        .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
        .replace(/\[(.+?)\]\((.+?)\)/g, '<a href="$2" target="_blank">$1</a>')
        .replace(/^- /gm, '• ')
        .replace(/_(.*?)_/g, '<em>$1</em>');
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const text = input.value.trim();
      if (!text) return;
      input.value = '';
      btn.disabled = true;
      addBubble(text, 'user');
      const thinking = addBubble('Searching Beverly civic data…', 'assistant');
      try {
        const res = await fetch('/ask', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text })
        });
        const data = await res.json();
        thinking.innerHTML = markdownToHtml(data.answer);
        const cited = data.sources.filter(s => s.url);
        if (cited.length) {
          const div = document.createElement('div');
          div.className = 'sources';
          div.innerHTML = '<span>Sources</span>' + cited.map(s =>
            `<a href="${escapeHtml(s.url)}" target="_blank">${escapeHtml(s.title)}</a>`
          ).join('');
          thinking.appendChild(div);
        }
      } catch {
        thinking.textContent = 'Something went wrong. Please try again.';
      }
      btn.disabled = false;
      input.focus();
    });
  </script>
</body>
</html>
